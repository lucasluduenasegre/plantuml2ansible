# role-config.yml
# Maps simplified role identifiers (as used in deployment diagrams) to their
# fully qualified Ansible role names and associated metadata.
#
# Keys per role:
#   fqcn        (required) Fully qualified collection name used in playbooks
#   packages    (optional) Packages installed by bertvv.rhbase for this role
#   exporter    (optional) Present only for Prometheus exporter roles
#     port        Port the exporter listens on
#     job_name    Prometheus scrape job name
#     dashboard   Grafana dashboard metadata (optional)
#       id          Grafana dashboard ID
#       revision    Grafana dashboard revision
#       folder      Grafana dashboard folder name
#       datasource  Grafana datasource name

roles:
  dns_server:
    fqcn: role_dns_server # custom role
    priority: 10
    galaxy_roles:
      - bertvv.bind
    packages: []

  dns_client:
    fqcn: role_dns_client # custom role
    priority: 20
    depends_on:
      - dns_server
    packages: []

  web_server:
    fqcn: role_web_server # custom role
    priority: 10
    galaxy_roles:
      - bertvv.httpd
    packages:
      - httpd
      - mariadb-server
      - php-fpm
      - php-mysqlnd
      - python3-PyMySQL

  prometheus:
    fqcn: prometheus.prometheus.prometheus # role from the prometheus.prometheus collection
    depends_on: dns_server
    priority: 20
    galaxy_collections:
      - prometheus.prometheus
    packages: []

  grafana:
    fqcn: grafana.grafana.grafana # role from the grafana.grafana collection
    depends_on: prometheus
    priority: 30
    galaxy_collections:
      - grafana.grafana
    packages: []

  node_exporter:
    fqcn: prometheus.prometheus.node_exporter # role from the prometheus.prometheus collection
    priority: 50
    galaxy_collections:
      - prometheus.prometheus
    packages: []
    exporter:
      port: 9100
      job_name: node_exporter
      dashboard:
        id: 1860
        revision: 42
        folder: "Node Exporter"
        datasource: prometheus

  bind_exporter:
    fqcn: prometheus.prometheus.bind_exporter # role from the prometheus.prometheus collection
    priority: 50
    depends_on: role_dns_server
    galaxy_collections:
      - prometheus.prometheus
    packages: []
    exporter:
      port: 9119
      job_name: bind_exporter
      dashboard:
        id: 12172
        revision: 6
        folder: "Bind9"
        datasource: prometheus

  mysqld_exporter:
    fqcn: prometheus.prometheus.mysqld_exporter # role from the prometheus.prometheus collection
    priority: 50
    depends_on:
      - web_server
        # Assumes mysqld_exporter monitors a MySQL instance managed by web_server.
        # Remove or adjust this dependency if targeting a standalone database host.
    galaxy_collections:
      - prometheus.prometheus
    packages:
      - python3-PyMySQL
    exporter:
      port: 9104
      job_name: mysqld_exporter
      dashboard:
        id: 14057
        revision: 1
        folder: "MySQL"
        datasource: prometheus
