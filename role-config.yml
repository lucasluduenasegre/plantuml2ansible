# role-config.yml
# Maps simplified role identifiers (as used in deployment diagrams) to their
# fully qualified Ansible role names and associated metadata.
#
# Keys per role:
#   fqcn (required)         Fully qualified collection name used in playbooks
#   priority (optional)     Intra-host role execution order — lower runs first, default 100
#   depends_on (optional)   Inter-host ordering — list of role identifiers that must be
#                           applied on another host before this role's host play runs
#   galaxy_roles (optional) Ansible Galaxy roles to install
#   galaxy_collections (optional) Ansible Galaxy collections to install
#   packages (optional)     Packages installed by bertvv.rh-base for this role
#   host_vars (optional)    Variables written to the host's host_vars file.
#                           Sentinels prefixed with __DIAGRAM_ are resolved at build time.
#   grafana_dashboard (optional) Dashboard metadata contributed to grafana_dashboards
#                           if this role is present in the diagram. Not written to this
#                           role's host — consumed by the grafana role only.

roles:
  dns_server:
    fqcn: role_dns_server
    priority: 10
    galaxy_roles:
      - bertvv.bind
    packages: []
    host_vars:
      bind_zones: __DIAGRAM_BIND_ZONES__

  dns_client:
    fqcn: role_dns_client
    priority: 20
    depends_on:
      - dns_server
    packages: []
    host_vars:
      dns_servers: __DIAGRAM_DNS_SERVER_IPS__

  web_server:
    fqcn: role_web_server
    priority: 10
    galaxy_roles:
      - bertvv.httpd
    packages:
      - httpd
      - mariadb-server
      - php-fpm
      - php-mysqlnd
      - python3-PyMySQL

  prometheus:
    fqcn: prometheus.prometheus.prometheus
    priority: 20
    galaxy_collections:
      - prometheus.prometheus
    packages: []
    host_vars:
      prometheus_scrape_configs: __DIAGRAM_SCRAPE_CONFIGS__

  grafana:
    fqcn: grafana.grafana.grafana # role from the grafana.grafana collection
    priority: 30
    depends_on:
      - prometheus
    galaxy_collections:
      - grafana.grafana
    packages: []
    host_vars:
      grafana_security:
        admin_user: admin
        admin_password: root
      grafana_datasources:
        - name: prometheus
          type: prometheus
          access: proxy
          url: "http://localhost:9090"
          basicAuth: false
      grafana_dashboards: __DIAGRAM_GRAFANA_DASHBOARDS__
      grafana_alerting: {}

  node_exporter:
    fqcn: prometheus.prometheus.node_exporter
    priority: 50
    galaxy_collections:
      - prometheus.prometheus
    packages: []
    host_vars:
      node_exporter_port: 9100
    grafana_dashboard:
      dashboard_id: 1860
      revision_id: 42
      folder: "Node Exporter"
      datasource: prometheus

  bind_exporter:
    fqcn: prometheus.prometheus.bind_exporter # role from the prometheus.prometheus collection
    priority: 50
    depends_on:
      - dns_server
    galaxy_collections:
      - prometheus.prometheus
    packages: []
    host_vars:
      bind_exporter_port: 9119
    grafana_dashboard:
      dashboard_id: 12172
      revision_id: 6
      folder: "Bind9"
      datasource: prometheus

  mysqld_exporter:
    fqcn: prometheus.prometheus.mysqld_exporter # role from the prometheus.prometheus collection
    priority: 50
    depends_on:
      - web_server
        # Assumes mysqld_exporter monitors a MySQL instance managed by web_server.
        # Remove or adjust this dependency if targeting a standalone database host.
    galaxy_collections:
      - prometheus.prometheus
    packages:
      - python3-PyMySQL
    host_vars:
      mysqld_exporter_port: 9104
    grafana_dashboard:
      dashboard_id: 14057
      revision_id: 1
      folder: "MySQL"
      datasource: prometheus