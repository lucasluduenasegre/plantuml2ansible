# ansible/inventory.yml
---
all:
  # Required vars for local testing with Vagrant (can also be written in a static group_vars/all.yml)
  vars:
    ansible_user: vagrant
    ansible_ssh_password: vagrant
    ansible_become: true
  children:
    # <network_name>:
    #   hosts:
    #     <hostname>:
    #       ansible_host: <ipv4_address>
    #     ...
    alpha:
      hosts:
        central-router:
          ansible_host: 172.26.0.254
        dns:
          ansible_host: 172.26.0.20
        monitoring:
          ansible_host: 172.26.0.30
        web:
          ansible_host: 172.26.0.10
    beta:
      hosts:
        central-router:
          ansible_host: 172.26.10.254
