# ansible/inventory_test_env.yml
---
all:
  children:
    # network-alpha
    network-alpha:
      vars:
        ansible_user: vagrant
        ansible_ssh_password: vagrant
        ansible_become: true
      hosts:
        # alpha-web
        alpha-web:
          ansible_host: 172.26.0.10
        # alpha-dns
        alpha-dns:
          ansible_host: 172.26.0.20
        # alpha-monitoring
        alpha-monitoring:
          ansible_host: 172.26.0.30
    # network-beta
    network-beta:
      vars:
        ansible_user: vagrant
        ansible_ssh_password: vagrant
        ansible_become: true
      hosts:
        # beta-workstation
        beta-workstation:
          ansible_host: 172.26.10.10
