# ansible/host_vars/monitoring.yml
---
# region bertvv.rhbase
rhbase_firewall_allow_ports:
  - 53/tcp # DNS
  - 53/udp # DNS
  - 3000/tcp # Grafana
# endregion

# region prometheus.prometheus.prometheus
prometheus_scrape_configs:
  - job_name: "node_exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:9100"
          - "dns.alpha.lan:9100"
          - "web.alpha.lan:9100"
  - job_name: "bind_exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "dns.alpha.lan:9119"
  - job_name: "mysqld_exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "web.alpha.lan:9104"
# endregion

# region grafana.grafana.grafana
grafana_security:
  admin_user: admin
  admin_password: root

grafana_datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: "http://localhost:9090"
    basicAuth: false

grafana_dashboards:
  - dashboard_id: 1860
    revision_id: 42
    folder: "Node Exporter"
    datasource: prometheus
  - dashboard_id: 12172
    revision_id: 6
    folder: "Bind9"
    datasource: prometheus
  - dashboard_id: 14057
    revision_id: 1
    folder: "MySQL"
    datasource: prometheus

grafana_alerting: {}
# endregion
